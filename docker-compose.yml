version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autotech-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: autotech
      POSTGRES_PASSWORD: autotech123
      POSTGRES_DB: autotech
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: autotech-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://autotech:autotech123@postgres:5432/autotech?schema=public
      JWT_SECRET: autotech-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - postgres

volumes:
  postgres_data:
